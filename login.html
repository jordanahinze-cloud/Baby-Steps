<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Baby Steps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #1e40af 0%, #dbeafe 50%, #ffffff 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        /* Estilo para os círculos do fundo */
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(30, 64, 175, 0.05);
            z-index: -1;
        }

        /* Estilo do cartão principal de login */
        .login-card {
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(30, 64, 175, 0.25);
            width: 90%;
            max-width: 420px;
            padding: 3.5rem 2rem;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 1.25rem;
        }

        .input-wrapper i {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: #1e40af;
        }

        /* Estilo personalizado dos campos de texto */
        .custom-input {
            width: 100%;
            padding: 1rem 1rem 1rem 3.2rem;
            border: 2px solid #f1f5f9;
            border-radius: 16px;
            background: #f8fafc;
            outline: none;
            transition: all 0.3s ease;
            color: #1e293b;
        }

        /* Efeito quando o usuário clica no input (foco) */
        .custom-input:focus {
            border-color: #1e40af;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(30, 64, 175, 0.1);
        }

        /* Estilo do botão de login */
        .btn-login {
            background: #1e40af;
            color: white;
            width: 100%;
            padding: 1rem;
            border-radius: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            margin-top: 1rem;
        }

        .btn-login:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(30, 64, 175, 0.3);
        }

        /* Botão para voltar a home */
        .back-home {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            background: #ffffff;
            color: #1e40af;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .back-home:hover {
            background: #1e40af;
            color: #ffffff;
        }

        .logo-container {
            width: 120px;
            margin: 0 auto 2.5rem;
        }
    </style>
</head>
<body>

    <div class="bg-circle" style="width: 400px; height: 400px; top: -100px; right: -100px;"></div>
    <div class="bg-circle" style="width: 300px; height: 300px; bottom: -50px; left: -50px;"></div>

    <a href="index.html" class="back-home" title="Voltar ao início">
        <i class="fas fa-arrow-left"></i>
    </a>

    <div class="login-card">
        <div class="text-center">
            <div class="logo-container">
                <img src="./baby-steps-logo-quadrado.png" alt="Baby Steps Logo" class="rounded-2xl shadow-sm">
            </div>
        </div>

        <form action="/login" method="post">
            <div class="input-wrapper">
                <i class="fas fa-user"></i>
                <input type="text" id="usuario" name="usuario" class="custom-input" placeholder="Utilizador" required>
            </div>

            <div class="input-wrapper">
                <i class="fas fa-lock"></i>
                <input type="password" id="senha" name="senha" class="custom-input" placeholder="Palavra-passe" required>
            </div>

            <button type="submit" class="btn-login">
                Entrar
            </button>

            <div class="mt-8 text-center">
                <a href="#" class="text-sm font-semibold text-[#1e40af] hover:underline">Recuperar acesso</a>
                <div class="mt-6 flex items-center justify-center space-x-2">
                    <span class="h-px w-6 bg-gray-200"></span>
                    <span class="text-[10px] text-gray-300 uppercase tracking-widest font-bold italic">Pequenos passos rumo ao futuro</span>
                    <span class="h-px w-6 bg-gray-200"></span>
                </div>
            </div>
        </form>
    </div>

</body>
</html>
